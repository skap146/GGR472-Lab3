<!-- Title text -->
<h1 class="text-center">Nearest Crime Map</h1>

<p class="text-center">Enter an address (must be inside Toronto) and find out which crimes in 2024 occurred close to the address</p>

<!-- Allow user to select distance -->
<div class="form-group">
    <label for="crime-dist" class="dropdown-title">Select max search distance:</label>
    <select id="crime-dist" class="form-control" onchange="change_search_distance(value)">
        <option value="200">200m</option>
        <option value="500">500m</option>
        <option value="1000">1000m</option>
    </select>
</div>

<!-- Add map -->
<div id="my-map" class="map-container-nc"></div>

<!-- Link to nearest crime script (different than main script) -->
<script src="js/nearest_crime.js"></script>
